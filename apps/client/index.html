<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zine</title>
    <script>
      // Resolve an explicit theme while the document is still parsing. Waiting
      // for the React module leaves WebKit's white default canvas visible.
      try {
        const storedTheme = localStorage.getItem("zine-theme");
        if (storedTheme === "light" || storedTheme === "dark") {
          document.documentElement.setAttribute("data-theme", storedTheme);
        }
      } catch {
        // Storage can be unavailable in restricted browser contexts. Auto theme
        // still follows the system preference through the critical CSS below.
      }
    </script>
    <style data-startup-background>
      :root {
        background-color: #e5e2da;
        color-scheme: light;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background-color: #0a0a0b;
          color-scheme: dark;
        }
      }

      :root[data-theme="light"] {
        background-color: #e5e2da;
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        background-color: #0a0a0b;
        color-scheme: dark;
      }

      body {
        background-color: inherit;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
